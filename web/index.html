<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="排期天菜——专为中国音乐剧观众打造的排期管理App。排期的事，交给排期天菜。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="排期天菜">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>排期天菜</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0F0F0F;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0F0F0F;
      z-index: 9999;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    #loading .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2.5px solid #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      color: #FFD700;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #loading .title {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 4px;
    }
    #loading .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }
    #loading .bar-wrap {
      margin-top: 36px;
      width: 200px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    #loading .bar {
      width: 40%;
      height: 100%;
      background: #FFD700;
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.7; }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style></head>
<body>
  <div id="loading">
    <div class="logo">排</div>
    <div class="title">排期天菜</div>
    <div class="subtitle">首次加载约需 10 秒，请耐心等待…</div>
    <div class="bar-wrap"><div class="bar"></div></div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="ocr_bridge.js"></script>
  <script>
    // 禁用旧 service worker，避免缓存导致的 localhost 连接问题
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
        }
      });
    }
    // 捕获未处理的错误，防止白屏
    window.addEventListener('error', function(e) {
      console.warn('[GlobalError]', e.message, e.filename, e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.warn('[UnhandledRejection]', String(e.reason));
      e.preventDefault();
    });
    // 拦截 buildConfig 设置，移除空的 build 项
    window._flutter = window._flutter || {};
    Object.defineProperty(window._flutter, 'buildConfig', {
      configurable: true,
      set: function(val) {
        if (val && val.builds) {
          val.builds = val.builds.filter(function(b) {
            return b.compileTarget && b.renderer;
          });
        }
        this._buildConfig = val;
      },
      get: function() {
        return this._buildConfig;
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Flutter 渲染完成后移除 loading 遮罩
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) {
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 400);
      }
    });
    // 兜底：如果 flutter-first-frame 没触发，30 秒后也移除
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    }, 30000);
  </script>
</body>
</html>
